<!DOCTYPE>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tugas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="/" class="navbar-brand">Portal Ihsan</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="/" class="nav-link">Jadwal</a>
                    </li>
                    <li class="nav-item">
                        <a href="/tugas" class="nav-link active">Tugas</a>
                    </li>
                    <li class="nav-item">
                        <a href="/absen" class="nav-link">Absen</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Edit Tugas</h2>
        <div class="card">
            <div class="card-body">
                <form action="/edit/{{ tugas.id }}" method="POST">

                    <div class="mb-3">
                        <label>Mata Kuliah</label>
                        <select name="matkul" class="form-select">
                            <option value="Pendidikan Agama" {% if tugas.matkul == 'Pendidikan Agama' %}selected{% endif %}>Pendidikan Agama</option>
                            <option value="Pemrograman Berbasis Objek" {% if tugas.matkul == 'Pemrograman Berbasis Objek' %}selected{% endif %}>Pemrograman Berbasis Objek</option>
                            <option value="Bahasa Inggris II" {% if tugas.matkul == 'Bahasa Inggris II' %}selected{% endif %}>Bahasa Inggris II</option>
                            <option value="Sistem Operasi" {% if tugas.matkul == 'Sistem Operasi' %}selected{% endif %}>Sistem Operasi</option>
                            <option value="Arsitektur Komputer" {% if tugas.matkul == 'Arsitektur Komputer' %}selected{% endif %}>Arsitektur Komputer</option>
                            <option value="Struktur Data" {% if tugas.matkul == 'Struktur Data' %}selected{% endif %}>Struktur Data</option>
                            <option value="Kalkulus" {% if tugas.matkul == 'Kalkulus' %}selected{% endif %}>Kalkulus</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Deskripsi Tugas</label>
                        <input type="text" name="deskripsi" class="form-control" value="{{ tugas.deskripsi}}" required>
                    </div>

                    <div class="mb-3">
                        <label>Deadline</label>
                        <input type="date" name="deadline" class="form-control" value="{{ tugas.deadline}}" required>
                    </div>

                    <div class="mb-3">
                        <label>Status</label>
                        <select name="status" class="form-select">
                            <option value="Belum Selesai" {% if tugas.status == 'Belum Selesai' %}selected{% endif %}>Belum Selesai</option>
                            <option value="Sedang Dikerjakan" {% if tugas.status == 'Sedang Dikerjakan' %}selected{% endif %}>Sedang Dikerjakan</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                    <a href="/tugas" class="btn btn-secondary">Batal</a>

                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
